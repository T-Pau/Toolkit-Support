# cspell: ignore fontawesome inlinehilite linenums mkdocstrings pymdownx pygments spacy superfences

[project]
site_name = "Toolkit"
site_url = "https://toolkit.tpau.group/"
repo_url = "https://github.com/T-Pau/Toolkit"
copyright = "©2025 Dieter Baron"
site_author = "Dieter Baron"
site_description = "Retro Development Toolkit"

nav = [
  { "Toolkit" = "index.md" },
  { "Tutorials" = [
    { "index.md" = "Tutorials/index.md" }
  ]},
  { "How-To Guides" = [
    { "index.md" = "How-To-Guides/index.md" }
  ]},
  { "Reference" = [
    { "index.md" = "Reference/index.md" },
    { "Scripts" = [
      { "index.md" = "Reference/Scripts/index.md" },
      { "convert-bitmaps" = "Reference/Scripts/convert-bitmaps.md" },
      { "convert-characters" = "Reference/Scripts/convert-characters.md" },
      { "convert-charset" = "Reference/Scripts/convert-charset.md" },
      { "convert-image" = "Reference/Scripts/convert-image.md" },
      { "convert-markdown" = "Reference/Scripts/convert-markdown.md" },
      { "convert-screens" = "Reference/Scripts/convert-screens.md" },
      { "convert-sprites" = "Reference/Scripts/convert-sprites.md" },
      { "create-disk" = "Reference/Scripts/create-disk.md" },
      { "create-zip" = "Reference/Scripts/create-zip.md" },
      { "encode-colors" = "Reference/Scripts/encode-colors.md" },
      { "parallel-struct" = "Reference/Scripts/parallel-struct.md" },
    ]},
    { "Python Classes" = [
      { "index.md" = "Reference/Classes/index.md" },
      { "AssemblerOutput" = "Reference/Classes/AssemblerOutput.md" },
      { "AtomicOutput" = "Reference/Classes/AtomicOutput.md" },
      { "BASICOutput" = "Reference/Classes/BASICOutput.md" },
      { "Buffer" = "Reference/Classes/Buffer.md" },
      { "CharacterImage" = "Reference/Classes/CharacterImage.md" },
      { "CharacterMapping" = "Reference/Classes/CharacterMapping.md" },
      { "Charset" = "Reference/Classes/Charset.md" },
      { "Command" = "Reference/Classes/Command.md" },
      { "Dependencies" = "Reference/Classes/Dependencies.md" },
      { "Disk" = "Reference/Classes/Disk.md" },
      { "FilePositionException" = "Reference/Classes/FilePositionException.md" },
      { "FileReader" = "Reference/Classes/FileReader.md" },
      { "MessageHandler" = "Reference/Classes/MessageHandler.md" },
      { "MessageHandlerCollect" = "Reference/Classes/MessageHandlerCollect.md" },
      { "MessageHandlerFile" = "Reference/Classes/MessageHandlerFile.md" },
      { "Palette" = "Reference/Classes/Palette.md" },
      { "PaletteImage" = "Reference/Classes/PaletteImage.md" },
      { "RunlengthEncoder" = "Reference/Classes/RunlengthEncoder.md" },
      { "Script" = "Reference/Classes/Script.md" },
      { "YAMLSpec" = "Reference/Classes/YAMLSpec.md" },
    ]},
  ]},
  { "Explanations" = "Explanations/index.md" },
  { "License" = "License.md" },
  { "Repository ↬" = "https://github.com/T-Pau/Toolkit/" },
]

extra_css = [
  "assets/styles/mkdocstrings.css",
  "assets/styles/tpau.css",
  "assets/styles/style.css",
]

[project.extra]
generator = false


[project.markdown_extensions.admonition]
[project.markdown_extensions.def_list]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.snippets]
[project.markdown_extensions.pymdownx.superfences]
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
[project.markdown_extensions.zensical.extensions.macros]

#plugins = ["privacy", "search"]

[project.plugins.mkdocstrings]
default_handler = "python"

[project.plugins.mkdocstrings.handlers.python]
paths = ["Toolkit/python-packages"]
options = {
  docstring_style = "google",
  docstring_options = {
    ignore_init_summary = true,
  },
  docstring_section_style = "spacy",
  merge_init_into_class = true,
  show_docstring_attributes = true,
  show_docstring_functions = true,
  show_docstring_classes = true,
  show_source = false,
  show_symbol_type_heading = true,
  show_attribute_values = false,
  inherited_members = true,
}


[project.theme]
custom_dir = "docs/.overrides"
favicon = "assets/images/favicon.ico"
font = false
features = [
    "navigation.indexes",
    "toc.integrate",
]

[project.theme.icon]
logo = "tpau/icon"
repo = "fontawesome/brands/github"

[project.theme.palette]
primary = "custom"

